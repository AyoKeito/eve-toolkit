# HTTP - ACME challenges + redirect
server {
    listen 80;
    listen [::]:80;
    server_name eve.ayokei.to;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$server_name$request_uri;
    }
}
# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name eve.ayokei.to;
    error_log  /var/log/nginx/eve.error.log;
    access_log /var/log/nginx/eve.access.log;
    ssl_certificate /etc/letsencrypt/live/eve.ayokei.to/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eve.ayokei.to/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Block scanners
    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zgrab|nuclei|httpx|dirbuster|gobuster|feroxbuster|wfuzz)) {
        return 444;
    }
    # Cloudflare sits in front of nginx, so the raw $remote_addr is a Cloudflare edge IP. Restore
    # the true client IP from the CF-Connecting-IP header, trusting it ONLY when the connection
    # originates from a Cloudflare range — a direct (non-CF) client cannot forge it. This is what
    # makes the X-Forwarded-For below trustworthy for rate limiting and request logging.
    # Ranges from https://www.cloudflare.com/ips/ — refresh if Cloudflare publishes changes.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;
    # Common proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # Overwrite, do NOT append. After real_ip above, $remote_addr is the true client IP. Appending
    # the client-supplied header (the old $proxy_add_x_forwarded_for) let a caller inject an
    # arbitrary left-most XFF entry that Fastify (trustProxy) trusted as request.ip — bypassing the
    # rate limiter and falsifying logs.
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    location = /robots.txt {
        proxy_pass http://localhost:3004;
    }
    location = /sitemap.xml {
        proxy_pass http://localhost:3004;
    }
    # AI/LLM site guide served by GET /llms.txt — must be allowlisted like robots/sitemap.
    location = /llms.txt {
        proxy_pass http://localhost:3004;
    }
    location = / {
        proxy_pass http://localhost:3004;
    }
    location = /about {
        return 301 /lp/about.html;
    }
    location /api/ {
        proxy_pass http://localhost:3004;
    }
    location = /lp {
        return 301 /lp/;
    }
    location = /lp/about {
        return 301 /lp/about.html;
    }
    location /lp/ {
        proxy_pass http://localhost:3004;
    }
    location = /missions {
        return 301 /missions/;
    }
    location /missions/ {
        proxy_pass http://localhost:3004;
    }
    location = /agents {
        return 301 /agents/;
    }
    location /agents/ {
        proxy_pass http://localhost:3004;
    }
    # Shared frontend assets (web/shared) introduced in the dedup refactor — served
    # by the server's /shared/ static route; must be proxied like /lp/ and /missions/.
    location /shared/ {
        proxy_pass http://localhost:3004;
    }
    # Owner-only trending-fits tool. Allowlisted so the path resolves, but deliberately
    # not linked from the hub / sitemap / llms.txt — "silent" page. /api/fits/* rides the
    # existing /api/ block above.
    location = /fits {
        return 301 /fits/;
    }
    location /fits/ {
        proxy_pass http://localhost:3004;
    }
    location / {
        return 404;
    }
}
